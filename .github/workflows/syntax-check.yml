name: Python Syntax Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Find all Python files
        id: find-py
        run: |
          echo "files=$(find . -name '*.py' -type f ! -path './.git/*' | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Check Python syntax
        run: |
          ERROR_COUNT=0
          declare -a ERROR_FILES=()

          for file in ${{ steps.find-py.outputs.files }}; do
            if ! python3 -m py_compile "$file" 2>&1; then
              ERROR_FILES+=("$file")
              ((ERROR_COUNT++))
            fi
          done

          if [ $ERROR_COUNT -gt 0 ]; then
            echo "❌ Syntax errors found in $ERROR_COUNT file(s):"
            for f in "${ERROR_FILES[@]}"; do
              echo "  - $f"
            done
            exit 1
          else
            echo "✅ All Python files passed syntax check"
          fi
